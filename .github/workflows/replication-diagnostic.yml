name: Replication Harness Diagnostic

on:
  pull_request:

jobs:
  focused:
    name: ${{ matrix.case.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: import_plan
            command: python -c "import sfa_bench.campaigns.replication_plan"
          - name: import_state
            command: python -c "import sfa_bench.campaigns.replication_state"
          - name: import_authorization
            command: python -c "import sfa_bench.campaigns.replication_authorization"
          - name: import_cli
            command: python -c "import openai_gpt56_replication"
          - name: load_preregistration
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import load_preregistration; load_preregistration(Path('.').resolve())"
          - name: build_slot_plan
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; build_slot_plan(Path('.').resolve())"
          - name: import_test_module
            command: python -c "import tests.test_openai_gpt56_replication"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: ${{ matrix.case.command }}
