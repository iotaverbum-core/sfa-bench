name: Replication Harness Diagnostic

on:
  pull_request:

jobs:
  focused:
    name: ${{ matrix.case.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: plan_counts
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; p=build_slot_plan(Path('.').resolve()); assert (p['slot_count'],p['block_count'],len(p['slots']))==(30,10,30)"
          - name: plan_first_order
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; p=build_slot_plan(Path('.').resolve()); assert [x['model'] for x in p['slots'][:3]]==['gpt-5.6-sol','gpt-5.6-terra','gpt-5.6-luna']"
          - name: plan_sol_ids
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; p=build_slot_plan(Path('.').resolve()); m=[x for x in p['slots'] if x['tier']=='sol']; assert len(m)==10; assert [x['execution_id'] for x in m]==[f'openai-gpt56-sol-replication-r1-{n:03d}' for n in range(1,11)]"
          - name: plan_terra_ids
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; p=build_slot_plan(Path('.').resolve()); m=[x for x in p['slots'] if x['tier']=='terra']; assert len(m)==10; assert [x['execution_id'] for x in m]==[f'openai-gpt56-terra-replication-r1-{n:03d}' for n in range(1,11)]"
          - name: plan_luna_ids
            command: python -c "from pathlib import Path; from sfa_bench.campaigns.replication_plan import build_slot_plan; p=build_slot_plan(Path('.').resolve()); m=[x for x in p['slots'] if x['tier']=='luna']; assert len(m)==10; assert [x['execution_id'] for x in m]==[f'openai-gpt56-luna-replication-r1-{n:03d}' for n in range(1,11)]"
          - name: initialize_temp_plan
            command: python -c "import os,tempfile; from pathlib import Path; from unittest import mock; from sfa_bench.campaigns.replication_plan import initialize_slot_plan,read_slot_plan; t=tempfile.TemporaryDirectory(); p=mock.patch.dict(os.environ,{'SFA_REPLICATION_HARNESS_ROOT':str(Path(t.name)/'harness'),'SFA_CAMPAIGN_CAPTURE_ROOT':str(Path(t.name)/'captures')},clear=False); p.start(); initialize_slot_plan(Path('.').resolve()); assert read_slot_plan(Path('.').resolve())['slot_count']==30; p.stop(); t.cleanup()"
          - name: authorize_temp_block
            command: python -c "import os,tempfile; from pathlib import Path; from unittest import mock; from sfa_bench.campaigns.replication_plan import initialize_slot_plan,read_slot_plan; from sfa_bench.campaigns.replication_authorization import build_block_authorization; t=tempfile.TemporaryDirectory(); p=mock.patch.dict(os.environ,{'SFA_REPLICATION_HARNESS_ROOT':str(Path(t.name)/'harness'),'SFA_CAMPAIGN_CAPTURE_ROOT':str(Path(t.name)/'captures')},clear=False); p.start(); r=Path('.').resolve(); initialize_slot_plan(r); plan=read_slot_plan(r); a=build_block_authorization(r,plan=plan,block=1,operator='Matthew Neal',rationale='Authorize.',issued_at='2026-07-20T13:30:00+02:00'); assert len(a['authorized_slots'])==3; p.stop(); t.cleanup()"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: ${{ matrix.case.command }}
