name: SFA-Bench

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full offline verification
        run: python verify_all.py

      - name: Run repository release gate
        run: python release_gate.py --ci
