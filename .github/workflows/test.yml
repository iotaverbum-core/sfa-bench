name: SFA-Bench

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run benchmark
        run: python run_benchmark.py

      - name: Replay sealed artifacts and ledger
        run: python replay.py

      - name: Generate history report
        run: python report.py

      - name: Run tamper and contamination suite
        run: python tamper_suite.py

      - name: Run verifier invariant suite
        run: python invariant_suite.py

      - name: Run SFA-Agent demo
        run: python agent_demo.py

      - name: Run external candidate demo
        run: python external_candidate_demo.py

      - name: Run transcript replay demo
        run: python transcript_demo.py

      - name: Re-derive transcript fixture verdicts
        run: python rederive.py

      - name: Run adapter boundary demo
        run: python adapter_demo.py
