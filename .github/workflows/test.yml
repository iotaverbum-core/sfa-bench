name: SFA-Bench

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so the frozen-zone amendment gate can diff against the
          # PR base ref (origin/$GITHUB_BASE_REF).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full offline verification
        run: python verify_all.py

      - name: Verify candidate integrity and evidence lineage
        run: python candidate_integrity_check.py

      - name: Verify V2 campaign protocol and benchmark lock
        run: python campaign_protocol_check.py

      - name: Run repository release gate
        run: python release_gate.py --ci

      - name: Frozen-zone attestation + amendment gate
        env:
          # Frozen changes require this protected, out-of-loop human input.
          SFA_FROZEN_ZONE_AMENDMENT_TOKEN: ${{ secrets.SFA_FROZEN_ZONE_AMENDMENT_TOKEN }}
        run: python frozen_zone_check.py --ci

  product:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Optional editable install (stdlib-only, no runtime deps)
        run: python -m pip install -e . --no-build-isolation

      - name: Run product test suite
        run: python -m unittest discover -s product -t . -p 'test_*.py'

      - name: Run product demo
        run: python -m product.demo

      - name: Reproducibility + tamper verification
        run: python -m product.groundledger.verification

      - name: GroundLedger CLI smoke test
        run: groundledger verify

  frontier:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Frontier Delta Suite tests
        run: python -m unittest discover -s tests -t . -p 'test_*.py'

      - name: Frontier Delta runner fixture smoke test
        run: >
          python -m sfa_bench.frontier_delta.runner
          --suite frontier_delta_v0
          --model historical-fixture-label
          --input sfa_bench/frontier_delta/fixtures/gpt55_outputs.jsonl
          --now 2026-07-03T00:00:00+00:00
